<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  </head>
  <body>
    <div class="profile-card">
      <img src="https://picsum.photos/100/100" alt="Profile" class="avatar" />
      <h2 class="name">Alexander (Alex) Jakubow</h2>
      <p class="bio">
        Social scientist & R programmer.
        <br />
        Making inference easier for all.
      </p>
      <button class="follow-btn">Follow Me!</button>
    </div>

    <div class="chart-card">
      <svg id="bar-chart"></svg>
    </div>

    <script>
      const data = [
        { name: "A", value: 1 },
        { name: "B", value: 5 },
        { name: "C", value: 8 },
        { name: "D", value: 10 },
      ];

      const margin = { top: 20, right: 20, bottom: 30, left: 40 };
      const width = 335 - margin.left - margin.right;
      const height = 220 - margin.top - margin.bottom;

      const svg = d3
        .select("#bar-chart")
        .attr("width", width + margin.left + margin.right)
        .attr("height", height + margin.top + margin.bottom)
        .append("g")
        .attr("transform", `translate(${margin.left},${margin.top})`);

      const x = d3
        .scaleBand()
        .domain(data.map((d) => d.name))
        .range([0, width])
        .padding(0.3);

      const y = d3
        .scaleLinear()
        .domain([0, d3.max(data, (d) => d.value)])
        .nice()
        .range([height, 0]);

      svg
        .append("g")
        .attr("transform", `translate(0,${height})`)
        .call(d3.axisBottom(x));

      svg.append("g").call(d3.axisLeft(y).ticks(5));

      svg
        .selectAll(".bar")
        .data(data)
        .enter()
        .append("rect")
        .attr("class", "bar")
        .attr("x", (d) => x(d.name))
        .attr("y", (d) => y(d.value))
        .attr("width", x.bandwidth())
        .attr("height", (d) => height - y(d.value))
        .attr("fill", "#7f5539")
        .attr("rx", 4);
    </script>
  </body>
</html>
